name: Задача #WFS
description: Постановка задачи для агента Лаборатории #WFS
title: "[[ЗАДАЧА] Завершить труд «Суслик: экономика свидетельствования»] "
labels: ["труд", "в работе"]
assignees:
  - Trushking
milestone: "Труды 2026 Q2"
body:
  - type: markdown
    attributes:
      value: |
        ## Сессия БИО-ЭЛЕКТРОНИК, агент DVOICH. Подготовлены Главы 1–3.
  - type: textarea
    id: context
    attributes:
      label: Контекст
      description: В рамках какой сессии или проекта возникла задача?
    validations:
      required: true
  - type: textarea
    id: task
    attributes:
      label: Написать Главы 4–7 и Приложения согласно утверждённому плану.
      description: Что именно требуется сделать?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Файлы SUSLIK_ECONOMY.md и SUSLIK_APPENDIX.md в папке WFS_CORE/BOOKS/SUSLIK/
      description: Какие артефакты должны быть созданы?
    validations:
      required: true
  - type: checkboxes
    id: acceptance
    attributes:
      label: отметить галочками соответствующие пункты (Глава 4, Глава 5, Глава 6, Глава 7, Приложения).
      options:
        - label: Глава 4 завершена
        - label: Глава 5 завершена
        - label: Глава 6 завершена
        - label: Приложения оформлены
  - type: input
    id: metrics_cm
    attributes:
      label: "#ЦМ (12)"
      placeholder: "10"
  - type: input
    id: metrics_time
    attributes:
      label: Время выполнения (2-3)
      placeholder: "2-3"
